<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnitCamS3 Configuration</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>UnitCamS3 配置</h1>
        
        <form id="configForm">
            <div class="form-section">
                <h2>WiFi 设置</h2>
                <div class="form-group">
                    <label for="wifiSsid">WiFi 名称 (SSID)</label>
                    <input type="text" id="wifiSsid" name="wifiSsid" required>
                </div>
                <div class="form-group">
                    <label for="wifiPass">WiFi 密码</label>
                    <input type="password" id="wifiPass" name="wifiPass">
                </div>
            </div>
            
            <div class="form-section">
                <h2>上传设置</h2>
                <div class="form-group">
                    <label for="postServer">服务器地址</label>
                    <input type="text" id="postServer" name="postServer">
                </div>
                <div class="form-group">
                    <label for="postPort">服务器端口</label>
                    <input type="number" id="postPort" name="postPort" required>
                </div>
                <div class="form-group">
                    <label for="postInterval">上传间隔 (秒)</label>
                    <input type="number" id="postInterval" name="postInterval" required>
                </div>
            </div>
            
            <div class="form-section">
                <h2>相机设置</h2>
                <div class="form-group">
                    <label for="jpegQuantity">JPEG 质量 (0-2)</label>
                    <input type="number" id="jpegQuantity" name="jpegQuantity" min="0" max="2" required>
                </div>
                <div class="form-group">
                    <label for="frameSize">画面尺寸</label>
                    <select id="frameSize" name="frameSize">
                        <option value="0">96x96</option>
                        <option value="1">128x128</option>
                        <option value="2">QQVGA (160x120)</option>
                        <option value="3">QCIF (176x144)</option>
                        <option value="4">HQVGA (240x176)</option>
                        <option value="5">240x240</option>
                        <option value="6">QVGA (320x240)</option>
                        <option value="7">320x320</option>
                        <option value="8">CIF (400x296)</option>
                        <option value="9">HVGA (480x320)</option>
                        <option value="10">VGA (640x480)</option>
                        <option value="11">SVGA (800x600)</option>
                        <option value="12">XGA (1024x768)</option>
                        <option value="13">HD (1280x720)</option>
                        <option value="14">SXGA (1280x1024)</option>
                        <option value="15">UXGA (1600x1200)</option>
                    </select>
                </div>
            </div>
            
            <button type="submit" id="saveBtn">保存并重启</button>
            <div id="message" class="message"></div>
        </form>
    </div>
    
    <script src="/app.js"></script>
</body>
</html>
